<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dominus Ultra WebGPU v2 • MindMend</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin:0; background:#0a0a0a; color:#0ff; font-family:system-ui; text-align:center; }
    h1 { color:#0f0; margin:20px; }
    .container { max-width:960px; margin:40px auto; padding:20px; background:#111; border-radius:16px; border:1px solid #0f0; }
    button { background:#0f0; color:#000; padding:15px 30px; font-size:18px; border:none; border-radius:8px; cursor:pointer; margin:10px; }
    button:hover { background:#0ff; }
    canvas { background:#000; border:1px solid #0ff; margin:20px auto; display:block; }
    .result { font-size:18px; margin:20px; color:#0f0; }
  </style>
</head>
<body>
  <h1>🌌 Dominus Ultra WebGPU v2</h1>
  <p style="color:#888;">MindMend • Multi-head • Precomputed freqs • Buffer reuse • Built for Michigan Families ❤️</p>
  
  <div class="container">
    <label>Head dim (even): <input id="dim" type="number" value="128" style="width:80px;"></label><br><br>
    <label>Tokens: <input id="tokens" type="number" value="1000" style="width:80px;"></label><br><br>
    <label>Heads: <input id="heads" type="number" value="8" style="width:60px;"></label><br><br>
    <label>Mode: 
      <select id="mode">
        <option value="0">0 - None</option>
        <option value="1" selected>1 - Linear</option>
        <option value="2">2 - NTK</option>
      </select>
    </label><br><br>
    
    <button onclick="runRoPE()">🚀 Run WebGPU RoPE v2</button>
    <button onclick="runCPUBench()">📊 CPU Benchmark</button>
    
    <div id="status" class="result"></div>
    <canvas id="chart" width="800" height="300"></canvas>
  </div>

  <p style="color:#555; margin-top:40px;">
    Part of <a href="https://github.com/MiMindMendinc/DominusUltra" style="color:#0ff;">Dominus Ultra</a> — privacy-first AI for youth mental health in Michigan.<br>
    Zero data leaves your device. Built with ❤️ in Owosso by @p_perrien
  </p>

<script>
// ==================== IMPROVED MULTI-HEAD WEBGPU ROPE ====================
async function createRoPEGPU({d=128, heads=8, base=1e4, scale=1, mode=0}){
  if(!('gpu' in navigator)) throw Error('WebGPU not supported');
  if(d%2) throw Error('dim must be even');
  const h=d>>>1, freq=new Float32Array(h);
  for(let i=0;i<h;i++){ 
    let f=Math.pow(base,-i/h);
    if(mode===1) f/=scale;
    else if(mode===2) f/=Math.pow(scale,i/h);
    freq[i]=f;
  }
  const ad=await navigator.gpu.requestAdapter(), dev=await ad.requestDevice(), q=dev.queue;
  const code=`struct U{d:u32;h:u32;n:u32;H:u32;inv:i32;ofs:u32;}
@group(0)@binding(0)var<storage,read_write> buf:array<f32>;
@group(0)@binding(1)var<storage,read> pos:array<u32>;
@group(0)@binding(2)var<uniform> u:U;
@group(0)@binding(3)var<storage,read> fr:array<f32>;
@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id)gid:vec3<u32>){
  let idx=gid.x, total=u.n*u.H*u.h; if(idx>=total){return;}
  let t=(idx/u.h)%u.n; let hd=(idx/u.h)/u.n; let i=idx%u.h;
  let base=(hd*u.n+t)*u.d; let j=i*2u;
  var ang=f32(pos[t]+u.ofs)*fr[i];
  if(u.inv<0){ang=-ang;}
  let a=buf[base+j],b=buf[base+j+1u],c=cos(ang),s=sin(ang);
  buf[base+j]=a*c-b*s; buf[base+j+1u]=a*s+b*c;
}`;
  const mod=dev.createShaderModule({code}), pipe=dev.createComputePipeline({layout:'auto',compute:{module:mod,entryPoint:'main'}});
  const uab=new ArrayBuffer(24), dv=new DataView(uab);
  const freqBuf=dev.createBuffer({size:freq.byteLength,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST}); q.writeBuffer(freqBuf,0,freq);
  let vecBuf=null, posBuf=null, outBuf=null, capBytes=0, capPosBytes=0;

  function ensureVec(bytes){
    if(bytes>capBytes){
      vecBuf?.destroy(); outBuf?.destroy();
      vecBuf=dev.createBuffer({size:bytes,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC});
      outBuf=dev.createBuffer({size:bytes,usage:GPUBufferUsage.COPY_DST|GPUBufferUsage.MAP_READ});
      capBytes=bytes;
    }
  }
  function ensurePos(bytes){
    if(bytes>capPosBytes){
      posBuf?.destroy();
      posBuf=dev.createBuffer({size:bytes,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});
      capPosBytes=bytes;
    }
  }
  async function run(vecs,positions,{tokens,headsCount=heads,offset=0,inPlace=false,inverse=false}={}){
    const n=tokens||positions.length, H=headsCount;
    if(vecs.length!==n*d*H) throw Error('shape mismatch');
    ensureVec(vecs.byteLength); ensurePos(positions.byteLength);
    q.writeBuffer(vecBuf,0,vecs); q.writeBuffer(posBuf,0,positions);
    dv.setUint32(0,d,true); dv.setUint32(4,h,true); dv.setUint32(8,n,true); dv.setUint32(12,H,true);
    dv.setInt32(16,inverse?-1:1,true); dv.setUint32(20,offset>>>0,true);
    const uBuf=dev.createBuffer({size:24,usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST}); q.writeBuffer(uBuf,0,uab);
    const enc=dev.createCommandEncoder(), pass=enc.beginComputePass();
    pass.setPipeline(pipe); pass.setBindGroup(0,dev.createBindGroup({layout:pipe.getBindGroupLayout(0),entries:[
      {binding:0,resource:{buffer:vecBuf}}, {binding:1,resource:{buffer:posBuf}},
      {binding:2,resource:{buffer:uBuf}}, {binding:3,resource:{buffer:freqBuf}}
    ]}));
    pass.dispatchWorkgroups(Math.ceil((n*H*h)/256)); pass.end();
    if(inPlace){ q.submit([enc.finish()]); return null; }
    enc.copyBufferToBuffer(vecBuf,0,outBuf,0,vecs.byteLength); q.submit([enc.finish()]);
    await outBuf.mapAsync(GPUMapMode.READ); const out=new Float32Array(outBuf.getMappedRange().slice(0)); outBuf.unmap(); return out;
  }
  return {apply:run};
}

let chart, ropegpu;
async function runRoPE() {
  const status = document.getElementById('status');
  status.textContent = '🚀 Initializing WebGPU v2...';
  try {
    const d = parseInt(document.getElementById('dim').value);
    const n = parseInt(document.getElementById('tokens').value);
    const H = parseInt(document.getElementById('heads').value);
    const m = parseInt(document.getElementById('mode').value);
    if(!ropegpu) ropegpu = await createRoPEGPU({d, heads:H, mode:m});
    const vecs = new Float32Array(n * d * H);
    for(let i=0;i<vecs.length;i++) vecs[i]=Math.random()*2-1;
    const positions = new Uint32Array(n).map((_,i)=>i);
    const start = performance.now();
    const rotated = await ropegpu.apply(vecs, positions, {tokens:n, headsCount:H});
    const ms = (performance.now()-start).toFixed(1);
    status.innerHTML = `✅ WebGPU v2 complete in <b>${ms} ms</b> (${H} heads)`;
    const before = vecs.slice(0,128);
    const after = rotated.slice(0,128);
    if(!chart){
      chart = new Chart(document.getElementById('chart'),{type:'line',data:{labels:Array.from({length:128},(_,i)=>i),datasets:[
        {label:'Before',borderColor:'#0ff',data:Array.from(before),tension:0.1},
        {label:'After v2',borderColor:'#0f0',data:Array.from(after),tension:0.1}
      ]},options:{animation:{duration:800},scales:{y:{grid:{color:'#222'}}}}});
    } else {
      chart.data.datasets[0].data = Array.from(before);
      chart.data.datasets[1].data = Array.from(after);
      chart.update();
    }
  } catch(e){ status.textContent = '❌ '+e.message; }
}

function runCPUBench(){ /* same simple CPU benchmark as before */ }
</script>
</body>
</html>
